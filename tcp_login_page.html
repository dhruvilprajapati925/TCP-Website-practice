<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCP Login</title>
    <link rel="stylesheet" href="tcp_website.css">
    <link rel="stylesheet" href="tcp_website.css">
    <link rel="stylesheet" href="/css/fluent--call-16-regular.css">
    <link rel="stylesheet" href="/css/all.min.css">
    <link rel="stylesheet" href="/css/right_arrow.css">
    <link rel="stylesheet" href="/css/calendar.css">
    <link rel="stylesheet" href="/css/subway--location-.css">
    <link rel="stylesheet" href="/css/logos--recaptcha.css">
    <link rel="stylesheet" href="/css/contact_address_icon.css">
    <link rel="stylesheet" href="/css/contact_email_icon.css">
    <link rel="stylesheet" href="/css/contact_call_icon.css">
</head>
<body style="background-color: #F5F5F7;">
    <div class="login_box">
        <div class="login_box_1">

        </div>
        <div class="login_box_2">
            <div class="login_box_2_logo" style="margin-bottom: 15px;">
                <a href="/tcp_homepage.html">
                    <img src="/img/login_page_logo.png" alt="" width="150px" height="100px">
                </a>
            </div>
            <p>Sign into Student account</p>
            <input type="text" alt="" placeholder="STUDENT ID" style="padding: 10px 15px; width: 369px; height: 23px; border: 1px solid #c9d4e5;  font-size: 13px; border-radius: 3px; font-weight: normal; margin-bottom: 10px;">
            <input type="password" placeholder="PASSWORD" style="padding: 10px 15px; width: 369px; height: 23px; border: 1px solid #c9d4e5; font-size: 13px; border-radius: 3px; font-weight: normal; margin-bottom: 10px;">
            <!-- recaptcha code is copy from contact page -->
            <div class="recaptcha" style="margin-bottom: 10px; width: 304px; height: 78px; background-color: #f9f9f9; border: 1px solid #ddd; border-radius: 3px; align-content: center;">
                <div class="contact_checkbox" style="float: left; margin-top: 20px; " >
                    <input type="checkbox" style="width: 24px; height: 24px; border-radius: 2px; border: 2px solid #ddd; margin-left: 10px; font-size: 1px;"></div>
                <div class="contact_massege_checkbox_text" style="margin-top: 25px; float: left; ">
                    <label for="" style="font-size: 14px; font-family: Roboto, helvetica, arial, sans-serif; font-weight: 500; line-height: 17px; color: black; margin-left: 9px;">I'm not a robot</label>
                </div>
                <div class="contact_captcha_img" style="float: left; margin-left: 90px; ">
                    <i class="logos--recaptcha" style="margin-top: 5px;"></i><br>
                    <label for="" style="font-size: 8px; color: rgb(102, 100, 100); margin-top: 0px; margin-bottom: 0px;">Privacy - Terms</label>
                </div>
            </div>
            <button class="button1">Login</button>
        </div>
    </div>
</body>
</html>
